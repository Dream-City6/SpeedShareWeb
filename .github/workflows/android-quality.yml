name: Android Quality

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"

permissions:
  contents: read

concurrency:
  group: android-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Unit tests and lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate source
        run: ./gradlew --no-daemon --stacktrace testDebugUnitTest lintDebug
