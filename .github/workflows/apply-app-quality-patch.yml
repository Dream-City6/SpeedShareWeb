name: Apply App Quality Patch

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/review/APPLY

permissions:
  contents: write

concurrency:
  group: apply-app-quality-patch
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: agent/app-quality-review
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode and validate patch
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/app-quality-diagnostics
          sha256sum .github/review/packed/part-* | tee /tmp/app-quality-diagnostics/remote-part-checksums.txt
          cat > /tmp/expected-part-checksums.txt <<'EOF'
          8f5684baf3c8e2c457193dfa7da39f338f70c8df8efc1b44b7150ff322ab9474  .github/review/packed/part-00
          b14eb9732bc3dcebcfc36f2f1e52998b99738e23419e365c6c08467be81955a4  .github/review/packed/part-01
          5603506a7d55ab65cf2a1ed7dd55438db43efb42ae7ecd71247a8b7e109a0d05  .github/review/packed/part-02
          a7180bda64283835dd08d4749db7b78f9878006571e6e852b90cae9f40741cb7  .github/review/packed/part-03
          EOF
          sha256sum --check /tmp/expected-part-checksums.txt | tee /tmp/app-quality-diagnostics/part-verification.txt
          cat .github/review/packed/part-* > /tmp/app-quality.patch.gz.b64
          echo "d3f27c470376c8cc482d0a577d76558ad0788270c4368ee678445e2e0cdbac94  /tmp/app-quality.patch.gz.b64" | sha256sum --check | tee /tmp/app-quality-diagnostics/base64-verification.txt
          base64 --decode /tmp/app-quality.patch.gz.b64 > /tmp/app-quality.patch.gz
          echo "c2646c3dc54414922177f159a67dfd61029f825ae152c1d951933fd97900868d  /tmp/app-quality.patch.gz" | sha256sum --check | tee /tmp/app-quality-diagnostics/gzip-verification.txt
          gzip --decompress --stdout /tmp/app-quality.patch.gz > /tmp/app-quality.patch
          echo "b8147d7186404c2dc20e6afc627c8e187c8b730248a3b5c8376a3956a6c191d2  /tmp/app-quality.patch" | sha256sum --check | tee /tmp/app-quality-diagnostics/patch-verification.txt
          git apply --check /tmp/app-quality.patch 2>&1 | tee /tmp/app-quality-diagnostics/git-apply-check.txt
          git apply /tmp/app-quality.patch
          git diff --check 2>&1 | tee /tmp/app-quality-diagnostics/git-diff-check.txt

      - name: Run unit tests and lint
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --console=plain --stacktrace testDebugUnitTest lintDebug | tee /tmp/app-quality-diagnostics/validated-patch.log

      - name: Commit validated source changes
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/review
          rm -f .github/workflows/apply-app-quality-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden upload and local network operations"
          git push origin HEAD:agent/app-quality-review

      - name: Upload validation diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: app-quality-patch-failure
          path: /tmp/app-quality-diagnostics
          retention-days: 7
          if-no-files-found: warn
